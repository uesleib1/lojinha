<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Feira Geek</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🎮 TELA INICIAL -->
<div id="telaInicial">
  <button class="botaoRPG" onclick="entrarJogo()">Começar</button>
</div>

<!-- 🎮 GAME -->
<div id="game">

  <!-- 🗺️ MAPA -->
  <div id="mapa">

    <!-- 🌬️ BANDEIRAS -->
    <div class="bandeiras"></div>

    <!-- ✨ PARTÍCULAS -->
    <div class="particulas"></div>

    <!-- 🎁 BAÚ -->
    <div id="bau"></div>

    <!-- 🏪 LOJAS -->
    <div id="lojasContainer">
      <div id="lojaCamisas" class="loja"></div>
      <div id="lojaCanecas" class="loja"></div>
      <div id="lojaChaveiros" class="loja"></div>
      <div id="lojaQuadros" class="loja"></div>
      <div id="lojaEcobags" class="loja"></div>
      <div id="lojaComidas" class="loja"></div>
    </div>

  </div>

  <!-- 💰 HUD -->
  <div id="moedasHUD">💰 0</div>
  <div id="inventarioHUD">🎒 Pedido</div>

  <!-- 🏪 MENU DA LOJA -->
  <div id="menuLoja">

    <h2 id="tituloLoja">LOJA</h2>

    <div id="opcoesLoja"></div>

    <!-- 🧾 PREVIEW -->
    <div id="produtoPreview" style="display:none; margin-top:15px;">
      <h3 id="nomeProduto"></h3>
      <img id="imagemProduto" style="width:100%; max-width:120px;">
    </div>

    <button onclick="fecharLoja()" style="margin-top:10px;">Fechar</button>

  </div>

  <!-- 🎒 INVENTÁRIO / PEDIDO -->
  <div id="inventarioBox">

    <h2>🧾 Seu Pedido</h2>

    <div id="listaInventario"></div>

    <div id="totalPedido">Total: 💰 0</div>

    <button id="btnFinalizar">Finalizar Pedido</button>
    <button onclick="fecharInventario()">Fechar</button>

  </div>

</div>

<!-- 🔔 NOTIFICAÇÕES -->
<div id="notificacoes"></div>

<!-- 📜 SCRIPT -->
<script src="script.js"></script>

</body>
</html>

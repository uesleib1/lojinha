<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Feira Geek</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="telaInicial">

  <!-- 🆕 TÍTULO -->
  <img src="img/titulo.png" id="tituloInicial" alt="Feira Geek">

  <!-- 🆕 BOTÃO COMO IMAGEM -->
  <img src="img/btn-inicial.png" id="btnComecar" alt="Começar" onclick="entrarJogo()">

  <!-- ÁUDIO DO JOGO -->
  <audio id="somInicio" src="sounds/inicia.mp3" preload="auto"></audio>

  <audio id="somBau" src="sounds/bau.mp3" preload="auto"></audio>

</div>

<div id="game">

  <div id="mapa">

    <div class="bandeiras"></div>
    <div class="particulas"></div>
    
    <!-- 🎁 BAÚ E BOTÃO DE COMBOS -->
    <div id="bau"></div>
    <div id="btnCombos"></div> <!-- NOVO BOTÃO DE COMBOS -->

    <div id="lojasContainer">
      <div id="lojaCamisas" class="loja"></div>
      <div id="lojaCanecas" class="loja"></div>
      <div id="lojaChaveiros" class="loja"></div>
      <div id="lojaQuadros" class="loja"></div>
      <div id="lojaEcobags" class="loja"></div>
      <div id="lojaComidas" class="loja"></div>
    </div>

  </div>

  <div id="moedasHUD">💰 0</div>
  <div id="inventarioHUD">🎒 Pedidos</div>

  <div id="inventarioSlots"></div>

  <div id="menuLoja">
    <h2 id="tituloLoja">LOJA</h2>
    <div id="opcoesLoja"></div>
    <button onclick="fecharLoja()">Fechar</button>
  </div>

  <div id="inventarioBox">
    <h2>🧾 Pedido</h2>
    <div id="listaInventario"></div>
    <div id="totalPedido">Total: 💰 0</div>
    <button id="btnFinalizar">Finalizar Pedido</button>
    <button onclick="fecharInventario()">Fechar</button>
  </div>

</div>

<!-- 👁️ VISUALIZADOR DE PRODUTO -->
<div id="visualizadorProduto">
  <span id="fecharVisualizador">✖</span>
  <img id="imgVisualizador" src="">
</div>

<div id="popupBoasVindas">
  <div id="popupConteudo">
    <span id="fecharPopup">✖</span>
    <div id="popupIcone">🎮</div>
    <h2>Bem-vindo à Feira!</h2>
    <p><strong style="color:#ffd700";>Dica importante:</strong></p>
    <p>Abra o <strong style="color:#ffd700;">baú</strong> no canto superior esquerdo para ganhar <strong style="color:#ffd700;">500 moedas</strong>!</p>
    <p>Depois, explore as lojas e monte seu pedido.</p>
    <p>Divirta-se e aproveite os produtos geeks!</p>
    <button id="btnEntendi">Entendi!</button>
  </div>
</div>

<!-- 🧑 MODAL PARA NOME DO CLIENTE -->
<div id="modalNomeCliente">
  <div id="modalNomeConteudo">
    <div id="modalNomeIcone">🧑‍🎤</div>
    <h2>Quase lá!</h2>
    <p>Para finalizar seu pedido, digite seu nome:</p>
    <input type="text" id="inputNomeCliente" placeholder="Seu nome aqui" maxlength="30" autocomplete="off">
    <div id="modalNomeBotoes">
      <button id="btnCancelarNome">Cancelar</button>
      <button id="btnConfirmarNome">Continuar</button>
    </div>
  </div>
</div>

<div id="notificacoes"></div>

<script src="script.js"></script>

</body>
</html>
